name: Release

# Manually triggered. Enter the version (e.g. `0.0.3`) and the workflow will:
#   1. validate the version is well-formed and greater than the current Cargo.toml version
#   2. bump Cargo.toml + Cargo.lock to that version on main
#   3. prepend a CHANGELOG.md section generated from `git log <prev>..HEAD`
#   4. run clippy + test on the bumped tree (pre-flight gate)
#   5. commit `chore: release vX.Y.Z`, tag `vX.Y.Z` on that commit, push main + tag
#   6. build amd64 + arm64 .so artifacts against the tagged commit
#   7. create the GitHub release with binaries, checksums, and source archives
#
# Pushes use GITHUB_TOKEN so they don't recurse into this workflow. The tag is
# created fresh on the bump commit — never moved.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 0.0.3 — no v prefix)"
        required: true
        type: string

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: false

jobs:
  prepare:
    name: Bump version, update CHANGELOG, tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.set.outputs.tag }}
      version: ${{ steps.set.outputs.version }}
      sha: ${{ steps.commit.outputs.sha }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate version
        id: set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"

          if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
            echo "::error::Invalid version: ${VERSION} (must be MAJOR.MINOR.PATCH)"
            exit 1
          fi

          CURRENT=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/^version = "(.+)"$/\1/')
          if ! dpkg --compare-versions "$VERSION" gt "$CURRENT"; then
            echo "::error::Version ${VERSION} must be greater than current Cargo.toml version ${CURRENT}"
            exit 1
          fi

          if git rev-parse "v${VERSION}" >/dev/null 2>&1; then
            echo "::error::Tag v${VERSION} already exists"
            exit 1
          fi

          if gh release view "v${VERSION}" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            echo "::error::Release v${VERSION} already exists"
            exit 1
          fi

          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install PAM headers
        run: sudo apt-get install -y libpam0g-dev

      - name: Bump Cargo.toml + Cargo.lock
        run: |
          set -euo pipefail
          VERSION="${{ steps.set.outputs.version }}"
          # Replace only the first `version = "..."` line — that's the [package] one.
          sed -i -E "0,/^version = / s/^version = \"[^\"]+\"/version = \"${VERSION}\"/" Cargo.toml
          # Update only the workspace package's pin in Cargo.lock; leaves deps alone.
          cargo update -p pam-ssh-agent-webauthn

      - name: Prepend CHANGELOG entry
        env:
          REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.set.outputs.version }}"

          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | head -1 || true)
          if [ -n "$PREV_TAG" ]; then
            NOTES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" || true)
            [ -z "$NOTES" ] && NOTES="- No changes since ${PREV_TAG}"
          else
            NOTES="- Initial release"
          fi
          # Convert (#N) PR refs to clickable links
          NOTES=$(echo "$NOTES" | sed -E "s|\\(#([0-9]+)\\)|([#\\1](https://github.com/${REPO}/pull/\\1))|g")

          ENTRY="## v${VERSION} ($(date -u +%Y-%m-%d))"

          # If the user pre-edited a section for this version, leave it alone.
          if grep -qE "^## v${VERSION//./\\.}( |\$)" CHANGELOG.md 2>/dev/null; then
            echo "CHANGELOG.md already has a section for v${VERSION}; leaving it as-is"
            exit 0
          fi

          {
            printf '%s\n\n' "$ENTRY"
            printf '%s\n\n' "$NOTES"
            [ -f CHANGELOG.md ] && cat CHANGELOG.md
          } > CHANGELOG.md.new
          mv CHANGELOG.md.new CHANGELOG.md

      - name: Pre-flight clippy + test on bumped tree
        run: |
          cargo clippy -- -D warnings
          cargo test

      - name: Commit, tag, push main
        id: commit
        run: |
          set -euo pipefail
          TAG="${{ steps.set.outputs.tag }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add Cargo.toml Cargo.lock CHANGELOG.md
          if git diff --cached --quiet; then
            echo "::error::Nothing to commit — Cargo.toml/CHANGELOG already at v${{ steps.set.outputs.version }} but no release exists. Investigate manually."
            exit 1
          fi
          git commit -m "chore: release ${TAG}"
          NEW_SHA=$(git rev-parse HEAD)
          echo "sha=${NEW_SHA}" >> "$GITHUB_OUTPUT"

          git tag "${TAG}" "${NEW_SHA}"
          git push origin HEAD:main
          git push origin "refs/tags/${TAG}"

  build:
    name: Build (${{ matrix.arch }})
    needs: prepare
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            arch: amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            arch: arm64
            cross: true
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install PAM headers (native)
        if: ${{ !matrix.cross }}
        run: sudo apt-get install -y libpam0g-dev

      - name: Install cross-compilation toolchain (aarch64)
        if: ${{ matrix.cross }}
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libpam0g-dev:arm64

      - name: Configure cross-compilation
        if: ${{ matrix.cross }}
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        id: rename
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          ARTIFACT="pam-ssh-agent-webauthn_${VERSION}_${{ matrix.arch }}.so"
          cp target/${{ matrix.target }}/release/libpam_ssh_agent_webauthn.so "${ARTIFACT}"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.artifact }}
          path: ${{ steps.rename.outputs.artifact }}

  release:
    name: Package & Release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.sha }}
          fetch-depth: 0

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums for binaries
        run: |
          cd binaries
          for f in *.so; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Package source
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          ARCHIVE="pam-ssh-agent-webauthn_${VERSION}"
          mkdir -p "${ARCHIVE}"
          cp -r Cargo.toml Cargo.lock LICENSE README.md CHANGELOG.md src examples tests "${ARCHIVE}/"
          zip -r "${ARCHIVE}.zip" "${ARCHIVE}"
          sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - name: Generate release notes
        run: |
          set -euo pipefail
          VERSION="${{ needs.prepare.outputs.version }}"
          # Extract just this version's section from CHANGELOG.md
          SECTION=$(awk -v ver="v${VERSION}" '
            $0 ~ "^## " ver "([[:space:]]|$)" { found=1; next }
            found && $0 ~ "^## " { exit }
            found
          ' CHANGELOG.md)

          {
            echo "## Prebuilt binaries"
            echo ""
            echo "Prebuilt \`.so\` modules are available for common targets. Download the one matching your architecture and copy it into place:"
            echo ""
            echo "\`\`\`bash"
            echo "sudo cp pam-ssh-agent-webauthn_${VERSION}_amd64.so /usr/lib/x86_64-linux-gnu/security/pam_ssh_agent_webauthn.so"
            echo "\`\`\`"
            echo ""
            echo "| File | Target |"
            echo "|------|--------|"
            echo "| \`pam-ssh-agent-webauthn_${VERSION}_amd64.so\` | x86_64 Linux (glibc, Ubuntu 22.04+, Debian 12+, RHEL 9+) |"
            echo "| \`pam-ssh-agent-webauthn_${VERSION}_arm64.so\` | ARM64 Linux (glibc, Ubuntu 22.04+, Debian 12+, Graviton) |"
            echo ""
            echo "These are dynamically linked against \`libpam\` and \`libc\` (glibc 2.35+). Built on Ubuntu 22.04."
            echo ""
            echo "## Source distribution"
            echo ""
            echo "For other targets, or if you need the \`native-crypto\` (OpenSSL/FIPS) feature:"
            echo ""
            echo "\`\`\`bash"
            echo "tar xzf pam-ssh-agent-webauthn_${VERSION}.tar.gz"
            echo "cd pam-ssh-agent-webauthn_${VERSION}"
            echo "cargo build --release"
            echo "\`\`\`"
            echo ""
            echo "See [README.md](https://github.com/${{ github.repository }}/blob/v${VERSION}/README.md) for full build and setup instructions."
            echo ""
            echo "## Changes"
            echo ""
            echo "$SECTION"
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          gh release create "v${VERSION}" \
            --title "pam-ssh-agent-webauthn ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            binaries/pam-ssh-agent-webauthn_${VERSION}_amd64.so \
            binaries/pam-ssh-agent-webauthn_${VERSION}_amd64.so.sha256 \
            binaries/pam-ssh-agent-webauthn_${VERSION}_arm64.so \
            binaries/pam-ssh-agent-webauthn_${VERSION}_arm64.so.sha256 \
            pam-ssh-agent-webauthn_${VERSION}.zip \
            pam-ssh-agent-webauthn_${VERSION}.zip.sha256 \
            pam-ssh-agent-webauthn_${VERSION}.tar.gz \
            pam-ssh-agent-webauthn_${VERSION}.tar.gz.sha256
