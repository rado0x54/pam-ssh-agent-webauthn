name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  verify:
    name: Verify release metadata
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Tag matches Cargo.toml + CHANGELOG entry exists
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          CARGO_VERSION=$(grep -E '^version' Cargo.toml | head -1 | sed -E 's/^version = "(.+)"$/\1/')
          if [ "$VERSION" != "$CARGO_VERSION" ]; then
            echo "::error::Tag $GITHUB_REF_NAME implies version $VERSION but Cargo.toml is $CARGO_VERSION."
            echo "::error::Bump Cargo.toml in a PR before tagging the release."
            exit 1
          fi
          if ! grep -qE "^## v${VERSION//./\\.}( |\$)" CHANGELOG.md; then
            echo "::error::CHANGELOG.md is missing a '## v${VERSION}' section."
            echo "::error::Add the entry in the release PR before tagging."
            exit 1
          fi
          echo "Verified: tag $GITHUB_REF_NAME, Cargo.toml $CARGO_VERSION, CHANGELOG entry present."

  ci:
    name: CI
    needs: verify
    uses: ./.github/workflows/ci.yml

  build:
    name: Build (${{ matrix.arch }})
    needs: ci
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-22.04
            arch: amd64
            cross: false
          - target: aarch64-unknown-linux-gnu
            runner: ubuntu-22.04
            arch: arm64
            cross: true
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install PAM headers (native)
        if: ${{ !matrix.cross }}
        run: sudo apt-get install -y libpam0g-dev

      - name: Install cross-compilation toolchain (aarch64)
        if: ${{ matrix.cross }}
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/^deb /deb [arch=amd64] /' /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          echo "deb [arch=arm64] http://ports.ubuntu.com/ jammy-updates main restricted universe multiverse" | sudo tee -a /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu libpam0g-dev:arm64

      - name: Configure cross-compilation
        if: ${{ matrix.cross }}
        run: |
          mkdir -p .cargo
          cat > .cargo/config.toml <<'EOF'
          [target.aarch64-unknown-linux-gnu]
          linker = "aarch64-linux-gnu-gcc"
          EOF

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Rename artifact
        id: rename
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARTIFACT="pam-ssh-agent-webauthn_${VERSION}_${{ matrix.arch }}.so"
          cp target/${{ matrix.target }}/release/libpam_ssh_agent_webauthn.so "${ARTIFACT}"
          echo "artifact=${ARTIFACT}" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.rename.outputs.artifact }}
          path: ${{ steps.rename.outputs.artifact }}

  release:
    name: Package & Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download prebuilt binaries
        uses: actions/download-artifact@v4
        with:
          path: binaries
          merge-multiple: true

      - name: Generate checksums for binaries
        run: |
          cd binaries
          for f in *.so; do
            sha256sum "$f" > "${f}.sha256"
          done

      - name: Package source
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          ARCHIVE="pam-ssh-agent-webauthn_${VERSION}"

          mkdir -p "${ARCHIVE}"
          cp -r Cargo.toml \
                Cargo.lock \
                LICENSE \
                README.md \
                CHANGELOG.md \
                src \
                examples \
                tests \
                "${ARCHIVE}/"

          zip -r "${ARCHIVE}.zip" "${ARCHIVE}"
          sha256sum "${ARCHIVE}.zip" > "${ARCHIVE}.zip.sha256"
          tar czf "${ARCHIVE}.tar.gz" "${ARCHIVE}"
          sha256sum "${ARCHIVE}.tar.gz" > "${ARCHIVE}.tar.gz.sha256"

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG=$(git tag --list 'v*' --sort=-v:refname | grep -v "$GITHUB_REF_NAME" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..${GITHUB_REF_NAME}"
          else
            RANGE="$GITHUB_REF_NAME"
          fi

          NOTES=$(git log "$RANGE" --pretty=format:"* %s (%h)")
          if [ -z "$NOTES" ]; then
            NOTES="* Initial release"
          fi

          # Convert PR references to clickable markdown links
          NOTES=$(echo "$NOTES" | sed -E 's|\(#([0-9]+)\)|([#\1](https://github.com/${{ github.repository }}/pull/\1))|g')
          REPO="${{ github.repository }}"
          NOTES=$(echo "$NOTES" | sed -E "s|([^(])https://github\\.com/${REPO}/pull/([0-9]+)|\1[#\2](https://github.com/${REPO}/pull/\2)|g")

          VERSION=${GITHUB_REF_NAME#v}
          {
            echo "## Prebuilt binaries"
            echo ""
            echo "Prebuilt \`.so\` modules are available for common targets. Download the one matching your architecture and copy it into place:"
            echo ""
            echo "\`\`\`bash"
            echo "sudo cp pam-ssh-agent-webauthn_${VERSION}_amd64.so /usr/lib/x86_64-linux-gnu/security/pam_ssh_agent_webauthn.so"
            echo "\`\`\`"
            echo ""
            echo "| File | Target |"
            echo "|------|--------|"
            echo "| \`pam-ssh-agent-webauthn_${VERSION}_amd64.so\` | x86_64 Linux (glibc, Ubuntu 22.04+, Debian 12+, RHEL 9+) |"
            echo "| \`pam-ssh-agent-webauthn_${VERSION}_arm64.so\` | ARM64 Linux (glibc, Ubuntu 22.04+, Debian 12+, Graviton) |"
            echo ""
            echo "These are dynamically linked against \`libpam\` and \`libc\` (glibc 2.35+). Built on Ubuntu 22.04."
            echo ""
            echo "## Source distribution"
            echo ""
            echo "For other targets, or if you need the \`native-crypto\` (OpenSSL/FIPS) feature:"
            echo ""
            echo "\`\`\`bash"
            echo "tar xzf pam-ssh-agent-webauthn_${VERSION}.tar.gz"
            echo "cd pam-ssh-agent-webauthn_${VERSION}"
            echo "cargo build --release"
            echo "\`\`\`"
            echo ""
            echo "See [README.md](https://github.com/${{ github.repository }}/blob/${GITHUB_REF_NAME}/README.md) for full build and setup instructions."
            echo ""
            echo "## Changes"
            echo ""
            echo "$NOTES"
          } > /tmp/release-notes.md

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          gh release create "$GITHUB_REF_NAME" \
            --title "pam-ssh-agent-webauthn ${VERSION}" \
            --notes-file /tmp/release-notes.md \
            binaries/pam-ssh-agent-webauthn_${VERSION}_amd64.so \
            binaries/pam-ssh-agent-webauthn_${VERSION}_amd64.so.sha256 \
            binaries/pam-ssh-agent-webauthn_${VERSION}_arm64.so \
            binaries/pam-ssh-agent-webauthn_${VERSION}_arm64.so.sha256 \
            pam-ssh-agent-webauthn_${VERSION}.zip \
            pam-ssh-agent-webauthn_${VERSION}.zip.sha256 \
            pam-ssh-agent-webauthn_${VERSION}.tar.gz \
            pam-ssh-agent-webauthn_${VERSION}.tar.gz.sha256

      # CHANGELOG is hand-edited in the release PR and verified by the
      # `verify` job above — no auto-commit back to main/develop. This avoids
      # the prior pattern where the bot pushed malformed entries to a
      # protected branch and broke format:check on the next CI run.
